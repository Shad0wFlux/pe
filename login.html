<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل دخول المتطوعين — فريق برلين التطوعي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
  <style>
    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: var(--space-md);
      position: relative;
      z-index: 1;
    }
    .auth-card-premium {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--space-xl);
      box-shadow: var(--shadow-xl);
      animation: scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .auth-logo-premium {
      text-align: center;
      margin-bottom: var(--space-lg);
    }
    .auth-logo-premium img {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-md);
      margin: 0 auto var(--space-sm);
      display: block;
      border: 2px solid var(--primary);
      box-shadow: var(--shadow-md);
    }
    .auth-logo-premium h2 {
      font-size: 1.45rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .auth-logo-premium p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .auth-links-premium {
      margin-top: var(--space-lg);
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: center;
    }
    .auth-links-premium a {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-secondary);
      transition: color var(--transition-fast);
    }
    .auth-links-premium a:hover {
      color: var(--primary);
    }
    .auth-message {
      font-size: 0.85rem;
      font-weight: 700;
      min-height: 24px;
      margin-top: 14px;
      text-align: center;
      padding: 8px;
      border-radius: var(--radius-sm);
      display: none;
    }
  </style>
</head>
<body class="auth-page-bg">

  <div class="auth-container">
    <div class="auth-card-premium">
      <div class="auth-logo-premium">
        <img src="logo.png" alt="شعار فريق برلين">
        <h2>بوابة المتطوعين</h2>
        <p>سجل دخولك لمتابعة ساعاتك وإنجازاتك التطوعية</p>
      </div>

      <div class="form-group form-group-with-icon">
        <label for="email">البريد الإلكتروني للمتطوع</label>
        <div class="form-control-wrapper">
          <input type="email" id="email" class="form-control" placeholder="username@example.com" required autocomplete="email">
          <i class="fa-solid fa-envelope form-control-icon"></i>
        </div>
      </div>

      <div class="form-group form-group-with-icon">
        <label for="password">كلمة المرور السرية</label>
        <div class="form-control-wrapper">
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
          <i class="fa-solid fa-lock form-control-icon"></i>
        </div>
      </div>

      <button id="loginBtn" class="btn-hms btn-primary" style="width: 100%; padding: 12px; margin-top: 10px;">
        <i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول للمنصة
      </button>

      <div id="message" class="auth-message"></div>

      <div class="auth-links-premium">
        <a href="#" onclick="document.getElementById('resetModal').style.display='flex'; return false;">نسيت كلمة المرور؟ استعادة الحساب</a>
        <div class="auth-divider"><span>أو</span></div>
        <a href="signup.html" style="color: var(--primary);">ليس لديك حساب؟ أنشئ حسابك التطوعي الآن <i class="fa-solid fa-arrow-left"></i></a>
        <a href="gateway.html" style="margin-top: 8px; font-size: 0.8rem; color: var(--text-muted);"><i class="fa-solid fa-chevron-right"></i> العودة للبوابة الموحدة</a>
      </div>
    </div>
  </div>

  <!-- Password Reset Modal -->
  <div class="modal-overlay" id="resetModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title"><i class="fa-solid fa-key"></i> استعادة كلمة المرور</h3>
        <button class="modal-close-btn" onclick="document.getElementById('resetModal').style.display='none';"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <p style="margin-bottom: var(--space-md); line-height: 1.6;">
          أدخل بريدك الإلكتروني المسجل لدينا وسنرسل لك رابطاً لإعادة تعيين كلمة المرور فوراً.
        </p>
        <div class="form-group form-group-with-icon">
          <label for="resetEmailInput">البريد الإلكتروني للبحث</label>
          <div class="form-control-wrapper">
            <input type="email" id="resetEmailInput" class="form-control" placeholder="أدخل بريدك الإلكتروني هنا...">
            <i class="fa-solid fa-envelope form-control-icon"></i>
          </div>
        </div>
        <p id="resetMsg" style="font-size: 0.82rem; font-weight: 700; min-height: 18px; margin-top: 10px; text-align: center;"></p>
      </div>
      <div class="modal-footer">
        <button class="btn-hms btn-outline btn-sm" onclick="document.getElementById('resetModal').style.display='none';">إلغاء</button>
        <button class="btn-hms btn-primary btn-sm" onclick="window.sendReset()">إرسال رابط الاستعادة</button>
      </div>
    </div>
  </div>

  <button id="themeToggle" class="theme-toggle-btn" aria-label="تبديل الثيم"><i class="fa-solid fa-sun"></i></button>

  <!-- Firebase Compat Scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAObqy7xz2BFlSCEJED7ZjWgPwyM5fQOqU",
      authDomain: "berlinteamapp.firebaseapp.com",
      projectId: "berlinteamapp",
      storageBucket: "berlinteamapp.appspot.com",
      messagingSenderId: "986675866046",
      appId: "1:986675866046:web:15bb3e179762e5aef0f1ef"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    document.getElementById("loginBtn").addEventListener("click", () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const message = document.getElementById('message');

      message.style.display = 'block';
      message.style.background = '';
      message.style.color = '';
      message.innerText = "";

      if (!email || !password) {
        message.style.background = 'var(--danger-light)';
        message.style.color = 'var(--danger)';
        message.innerText = "يرجى تعبئة جميع الحقول.";
        return;
      }

      message.style.background = 'var(--primary-light)';
      message.style.color = 'var(--primary)';
      message.innerText = "جاري التحقق من بيانات المتطوع...";

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          message.style.background = 'var(--success-light)';
          message.style.color = 'var(--success)';
          message.innerHTML = '<i class="fa-solid fa-circle-check"></i> تم تسجيل الدخول بنجاح! جارٍ التحويل...';
          setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
        })
        .catch((error) => {
          message.style.background = 'var(--danger-light)';
          message.style.color = 'var(--danger)';
          message.innerText = "خطأ في البريد الإلكتروني أو كلمة المرور.";
        });
    });

    window.sendReset = async function() {
      const resetEmail = document.getElementById("resetEmailInput").value.trim();
      const msg = document.getElementById("resetMsg");

      if (!resetEmail) {
        msg.style.color = "var(--danger)";
        msg.innerText = "يرجى كتابة البريد الإلكتروني أولاً.";
        return;
      }

      msg.style.color = "var(--text-secondary)";
      msg.innerText = "جاري إرسال الرابط...";

      try {
        await auth.sendPasswordResetEmail(resetEmail);
        msg.style.color = "var(--success)";
        msg.innerHTML = '<i class="fa-solid fa-circle-check"></i> تم إرسال رابط الاستعادة بنجاح! تفقد صندوق الوارد.';
        setTimeout(() => { document.getElementById('resetModal').style.display = 'none'; }, 4000);
      } catch (e) {
        msg.style.color = "var(--danger)";
        if (e.code === 'auth/user-not-found') msg.innerText = "لا يوجد حساب مسجل لدينا بهذا البريد.";
        else msg.innerText = "حدث خطأ. تأكد من صحة البريد المدخل.";
      }
    };

    document.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        if (document.getElementById('resetModal').style.display === 'flex') {
          window.sendReset();
        } else {
          document.getElementById("loginBtn").click();
        }
      }
    });
  </script>
</body>
</html>
